<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WA Status Saver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #25D366;
    --green-dark: #1aab52;
    --green-dim: rgba(37,211,102,0.12);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --yellow: #facc15;
    --yellow-dark: #d97706;
    --bg: #0b0b0b;
    --bg2: #111111;
    --bg3: #171717;
    --bg4: #1e1e1e;
    --border: #222;
    --border2: #2e2e2e;
    --text: #e8e8e8;
    --text2: #888;
    --text3: #555;
    --radius: 14px;
    --radius-sm: 8px;
    --radius-pill: 999px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(11,11,11,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--green);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 18px; height: 18px; }

  .logo-name {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .logo-name em { color: var(--green); font-style: normal; }

  .header-mid { flex: 1; }

  .stat-chips { display: flex; gap: 6px; align-items: center; }

  .chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: var(--radius-pill);
    font-size: 11.5px;
    font-family: 'Space Mono', monospace;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    transition: border-color 0.2s;
  }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .chip.active { border-color: var(--border2); color: var(--text); }
  .dot-img { background: var(--green); }
  .dot-vid { background: var(--purple); }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* ─── BUTTONS ─── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    text-decoration: none;
  }
  .btn svg { flex-shrink: 0; }
  .btn-primary { background: var(--green); color: #0b0b0b; border-color: var(--green); font-weight: 600; }
  .btn-primary:hover { background: var(--green-dark); border-color: var(--green-dark); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-ghost { background: transparent; color: var(--text2); }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
  .btn-yellow { background: var(--yellow); color: #0b0b0b; border-color: var(--yellow); font-weight: 600; }
  .btn-yellow:hover { background: #e5b800; transform: translateY(-1px); }
  .btn-danger { background: transparent; color: #f87171; border-color: rgba(248,113,113,0.25); }
  .btn-danger:hover { background: rgba(248,113,113,0.08); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-icon { padding: 7px; border-radius: var(--radius-sm); }

  /* ─── AUTO-LOAD BANNER ─── */
  .auto-banner {
    background: var(--green-dim);
    border: 1px solid rgba(37,211,102,0.2);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 12.5px;
    color: var(--green);
    margin-bottom: 20px;
  }
  .auto-banner.show { display: flex; }
  .auto-banner svg { width: 15px; height: 15px; stroke: currentColor; flex-shrink: 0; }
  .auto-banner-text { flex: 1; }
  .auto-banner-path {
    font-family: 'Space Mono', monospace;
    font-size: 10.5px;
    color: var(--text2);
    margin-top: 2px;
  }
  .auto-banner-actions { display: flex; gap: 6px; }

  /* ─── MAIN LAYOUT ─── */
  .main { padding: 24px 28px 100px; }

  /* ─── HERO ─── */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 20px;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-ring {
    width: 96px; height: 96px;
    border-radius: 28px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
    position: relative;
  }
  .hero-ring::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 29px;
    background: linear-gradient(135deg, var(--green-dim), transparent 60%);
    z-index: -1;
  }
  .hero-ring svg { width: 42px; height: 42px; stroke: var(--green); }

  .hero h1 { font-size: 26px; font-weight: 500; color: #fff; margin-bottom: 10px; letter-spacing: -0.5px; }
  .hero p { font-size: 14px; color: var(--text2); line-height: 1.7; max-width: 380px; margin-bottom: 28px; }

  .hero-steps {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    font-size: 12.5px;
    color: var(--text2);
  }
  .step-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--green-dim);
    color: var(--green);
    font-size: 11px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .path-hint {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11.5px;
    color: var(--text2);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .path-hint span { color: var(--green); }

  /* ─── TOOLBAR ─── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .filter-group {
    display: flex;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 3px;
    gap: 2px;
  }
  .ftab {
    padding: 5px 14px;
    border-radius: 5px;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .ftab.active { background: var(--bg4); color: var(--text); }
  .ftab:hover:not(.active) { color: var(--text2); }

  .spacer { flex: 1; }

  .sort-select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-size: 12.5px;
    padding: 6px 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    outline: none;
  }
  .sort-select:focus { border-color: var(--border2); }

  /* ─── GRID ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
    gap: 10px;
  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.2s;
    animation: cardIn 0.35s ease both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  .card:hover { border-color: var(--border2); transform: translateY(-3px); }
  .card.selected { border-color: var(--yellow) !important; }
  .card.selected .check { background: var(--yellow); border-color: var(--yellow); }
  .card.selected .check svg { display: block; }
  .card-thumb { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; background: var(--bg4); }
  video.card-thumb { object-fit: cover; }
  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 55%, transparent 100%);
    opacity: 0;
    transition: opacity 0.2s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 10px;
  }
  .card:hover .card-overlay { opacity: 1; }
  .card-bottom { display: flex; align-items: center; justify-content: space-between; }
  .card-fname {
    font-size: 10px;
    color: rgba(255,255,255,0.75);
    font-family: 'Space Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 80px;
  }
  .card-btns { display: flex; gap: 5px; }
  .cibtn {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: rgba(255,255,255,0.13);
    border: 1px solid rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.1s;
    backdrop-filter: blur(6px);
  }
  .cibtn:hover { background: rgba(255,255,255,0.25); }
  .cibtn svg { width: 13px; height: 13px; stroke: #fff; }
  .check {
    position: absolute;
    top: 8px; right: 8px;
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 1.5px solid rgba(255,255,255,0.35);
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    backdrop-filter: blur(4px);
    z-index: 2;
  }
  .check svg { width: 12px; height: 12px; stroke: #0b0b0b; display: none; stroke-width: 2.5; }
  .type-badge {
    position: absolute;
    top: 8px; left: 8px;
    padding: 2px 7px;
    border-radius: 5px;
    font-size: 9.5px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.3px;
    z-index: 2;
  }
  .badge-img { background: var(--green-dim); color: var(--green); border: 1px solid rgba(37,211,102,0.25); }
  .badge-vid { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(167,139,250,0.25); }
  .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .play-circle {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    border: 1.5px solid rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    transition: opacity 0.2s;
  }
  .play-circle svg { width: 14px; height: 14px; fill: #fff; margin-left: 2px; }
  .card:hover .play-circle { opacity: 0; }

  /* ─── SELECTION BAR ─── */
  .sel-bar {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 18px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    white-space: nowrap;
    backdrop-filter: blur(16px);
  }
  .sel-bar.show { transform: translateX(-50%) translateY(0); }
  .sel-info { display: flex; align-items: center; gap: 8px; padding-right: 10px; border-right: 1px solid var(--border2); }
  .sel-num { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--yellow); line-height: 1; }
  .sel-lbl { font-size: 12px; color: var(--text2); }

  /* ─── PROGRESS BAR ─── */
  .pbar-wrap { height: 2px; background: var(--bg3); margin-bottom: 20px; border-radius: 1px; overflow: hidden; display: none; }
  .pbar-wrap.show { display: block; }
  .pbar-fill { height: 100%; background: var(--green); border-radius: 1px; width: 0%; transition: width 0.25s ease; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 11px 16px;
    font-size: 13px;
    color: var(--text);
    display: flex; align-items: center; gap: 10px;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
    pointer-events: none;
    max-width: 300px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast-ico { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .toast-ico.err { background: #f87171; }
  .toast-ico.warn { background: var(--yellow); }

  /* ─── LIGHTBOX ─── */
  .lb { position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 9999; display: none; align-items: center; justify-content: center; animation: fadeIn 0.2s ease; }
  .lb.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .lb-inner { position: relative; max-width: 92vw; max-height: 92vh; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .lb img, .lb video { max-width: 92vw; max-height: 80vh; border-radius: 12px; object-fit: contain; display: block; }
  .lb-close {
    position: absolute;
    top: -44px; right: 0;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    transition: background 0.15s;
  }
  .lb-close:hover { background: rgba(255,255,255,0.2); }
  .lb-close svg { width: 16px; height: 16px; stroke: #fff; }
  .lb-meta { display: flex; align-items: center; gap: 10px; }
  .lb-name { font-family: 'Space Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.5); }

  /* ─── COMPAT WARNING ─── */
  .compat-warn {
    background: rgba(250,204,21,0.08);
    border: 1px solid rgba(250,204,21,0.2);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12.5px;
    color: #d4a017;
    margin-bottom: 20px;
  }
  .compat-warn svg { width: 16px; height: 16px; stroke: currentColor; flex-shrink: 0; }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .header { padding: 0 16px; }
    .main { padding: 16px 16px 120px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
    .logo-name { display: none; }
    .chip { display: none; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0b0b0b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
    </div>
    <span class="logo-name">WA<em>Status</em>Saver</span>
  </div>

  <div class="header-mid">
    <div class="stat-chips" id="statChips" style="display:none">
      <div class="chip active"><span class="dot dot-img"></span><span id="imgCnt">0</span> images</div>
      <div class="chip active"><span class="dot dot-vid"></span><span id="vidCnt">0</span> videos</div>
    </div>
  </div>

  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" id="btnClearAll" style="display:none" onclick="clearAll()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      Clear
    </button>
    <button class="btn btn-ghost btn-sm" id="btnRefresh" style="display:none" onclick="refreshFolder()" title="Reload folder">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Refresh
    </button>
    <button class="btn btn-primary" onclick="openFolder()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      Open Status Folder
    </button>
  </div>
</header>

<!-- MAIN -->
<main class="main" id="main">

  <!-- progress bar -->
  <div class="pbar-wrap" id="pbar"><div class="pbar-fill" id="pbarFill"></div></div>

  <!-- browser compat warning -->
  <div class="compat-warn" id="compatWarn" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    Your browser doesn't fully support folder access. Please use <strong style="margin:0 4px">Google Chrome</strong> or <strong>Microsoft Edge</strong> on desktop for the best experience.
  </div>

  <!-- auto-load banner (shown when a saved folder is found) -->
  <div class="auto-banner" id="autoBanner">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      <polyline points="9 11 12 14 22 4"/>
    </svg>
    <div>
      <div class="auto-banner-text">Auto-loaded from remembered folder</div>
      <div class="auto-banner-path" id="autoBannerPath"></div>
    </div>
    <div class="auto-banner-actions">
      <button class="btn btn-ghost btn-sm" onclick="forgetFolder()">Forget</button>
    </div>
  </div>

  <!-- toolbar (shown after load) -->
  <div class="toolbar" id="toolbar" style="display:none">
    <div class="filter-group">
      <button class="ftab active" onclick="setFilter('all',this)">All</button>
      <button class="ftab" onclick="setFilter('image',this)">Images</button>
      <button class="ftab" onclick="setFilter('video',this)">Videos</button>
    </div>
    <select class="sort-select" id="sortSel" onchange="renderGrid()">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="name">Name A–Z</option>
      <option value="size">Largest first</option>
    </select>
    <div class="spacer"></div>
    <button class="btn btn-ghost btn-sm" onclick="selectAll()">Select all</button>
    <button class="btn btn-ghost btn-sm" onclick="clearSel()">Deselect</button>
  </div>

  <!-- grid -->
  <div class="grid" id="grid">
    <!-- hero / empty state injected by JS -->
  </div>
</main>

<!-- SELECTION BAR -->
<div class="sel-bar" id="selBar">
  <div class="sel-info">
    <span class="sel-num" id="selNum">0</span>
    <span class="sel-lbl">selected</span>
  </div>
  <button class="btn btn-yellow btn-sm" onclick="downloadSelected()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download Selected
  </button>
  <button class="btn btn-ghost btn-sm" onclick="clearSel()">Cancel</button>
</div>

<!-- LIGHTBOX -->
<div class="lb" id="lb" onclick="closeLb(event)">
  <div class="lb-inner" id="lbInner">
    <button class="lb-close" onclick="closeLb()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div id="lbMedia"></div>
    <div class="lb-meta">
      <span class="lb-name" id="lbName"></span>
      <button class="btn btn-primary btn-sm" id="lbDl">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Save to Gallery
      </button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span class="toast-ico" id="toastIco"></span>
  <span id="toastMsg"></span>
</div>

<script>
  /* ─── STATE ─── */
  let files = [];
  let filter = 'all';
  let selected = new Set();
  let toastTimer = null;
  let savedDirHandle = null; // the persisted FileSystemDirectoryHandle

  const SUPPORTED_TYPES = new Set([
    'image/jpeg','image/jpg','image/png','image/webp','image/gif',
    'video/mp4','video/webm','video/quicktime','video/3gpp','video/x-matroska'
  ]);

  const DB_NAME = 'wa-status-saver';
  const DB_STORE = 'handles';
  const DB_KEY = 'lastDir';

  /* ─── IndexedDB HELPERS ─── */
  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => {
        e.target.result.createObjectStore(DB_STORE);
      };
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function saveHandle(handle) {
    try {
      const db = await openDB();
      const tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).put(handle, DB_KEY);
      return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
    } catch(e) { console.warn('Could not save handle', e); }
  }

  async function loadHandle() {
    try {
      const db = await openDB();
      const tx = db.transaction(DB_STORE, 'readonly');
      const req = tx.objectStore(DB_STORE).get(DB_KEY);
      return new Promise((res, rej) => {
        req.onsuccess = () => res(req.result || null);
        req.onerror = () => res(null);
      });
    } catch(e) { return null; }
  }

  async function deleteHandle() {
    try {
      const db = await openDB();
      const tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).delete(DB_KEY);
    } catch(e) {}
  }

  /* ─── BROWSER COMPAT CHECK ─── */
  (function checkCompat() {
    if (!window.showDirectoryPicker) {
      document.getElementById('compatWarn').style.display = 'flex';
    }
  })();

  /* ─── AUTO-LOAD ON PAGE START ─── */
  window.addEventListener('DOMContentLoaded', async () => {
    renderGrid(); // show empty hero first

    if (!window.showDirectoryPicker) return;

    const handle = await loadHandle();
    if (!handle) return;

    // Check if permission is still granted (without prompting)
    try {
      const perm = await handle.queryPermission({ mode: 'read' });
      if (perm === 'granted') {
        // Permission still active — load silently
        savedDirHandle = handle;
        document.getElementById('autoBannerPath').textContent = handle.name;
        document.getElementById('autoBanner').classList.add('show');
        await loadFromDir(handle, true);
      } else if (perm === 'prompt') {
        // Need to re-ask — show a nudge banner but don't auto-prompt
        // (browsers block permission requests without user gesture)
        showResumeButton(handle);
      }
      // if 'denied', do nothing
    } catch(e) {
      // Handle is stale / unavailable
      await deleteHandle();
    }
  });

  /* ─── RESUME BANNER (permission needs re-grant) ─── */
  function showResumeButton(handle) {
    const banner = document.getElementById('autoBanner');
    banner.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;flex-shrink:0">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      <div style="flex:1">
        <div class="auto-banner-text" style="color:var(--yellow)">Tap to reload your saved folder</div>
        <div class="auto-banner-path">${handle.name}</div>
      </div>
      <div class="auto-banner-actions">
        <button class="btn btn-yellow btn-sm" onclick="reGrantAndLoad()">Re-open</button>
        <button class="btn btn-ghost btn-sm" onclick="forgetFolder()">Forget</button>
      </div>
    `;
    banner.style.background = 'rgba(250,204,21,0.08)';
    banner.style.borderColor = 'rgba(250,204,21,0.2)';
    banner.classList.add('show');
    window._pendingHandle = handle;
  }

  async function reGrantAndLoad() {
    const handle = window._pendingHandle;
    if (!handle) return;
    try {
      const perm = await handle.requestPermission({ mode: 'read' });
      if (perm === 'granted') {
        savedDirHandle = handle;
        document.getElementById('autoBannerPath').textContent = handle.name;
        const banner = document.getElementById('autoBanner');
        banner.style.background = '';
        banner.style.borderColor = '';
        banner.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;flex-shrink:0">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            <polyline points="9 11 12 14 22 4"/>
          </svg>
          <div>
            <div class="auto-banner-text">Auto-loaded from remembered folder</div>
            <div class="auto-banner-path" id="autoBannerPath">${handle.name}</div>
          </div>
          <div class="auto-banner-actions">
            <button class="btn btn-ghost btn-sm" onclick="forgetFolder()">Forget</button>
          </div>
        `;
        await loadFromDir(handle, true);
      } else {
        toast('Permission denied.', 'err');
      }
    } catch(e) {
      toast('Could not re-open folder.', 'err');
    }
  }

  /* ─── OPEN FOLDER ─── */
  async function openFolder() {
    if (!window.showDirectoryPicker) {
      toast('Please use Chrome or Edge on desktop to open folders.', 'err');
      return;
    }
    try {
      const dir = await window.showDirectoryPicker({ mode: 'read' });
      savedDirHandle = dir;
      await saveHandle(dir);
      document.getElementById('autoBannerPath').textContent = dir.name;
      document.getElementById('autoBanner').classList.add('show');
      await loadFromDir(dir, false);
    } catch(e) {
      if (e.name !== 'AbortError') toast('Could not open folder: ' + e.message, 'err');
    }
  }

  /* ─── REFRESH FOLDER ─── */
  async function refreshFolder() {
    if (!savedDirHandle) return;
    try {
      const perm = await savedDirHandle.queryPermission({ mode: 'read' });
      if (perm === 'granted') {
        await loadFromDir(savedDirHandle, true);
      } else {
        const p = await savedDirHandle.requestPermission({ mode: 'read' });
        if (p === 'granted') await loadFromDir(savedDirHandle, true);
        else toast('Permission denied.', 'err');
      }
    } catch(e) {
      toast('Could not refresh: ' + e.message, 'err');
    }
  }

  /* ─── FORGET FOLDER ─── */
  async function forgetFolder() {
    await deleteHandle();
    savedDirHandle = null;
    document.getElementById('autoBanner').classList.remove('show');
    clearAll();
    toast('Remembered folder cleared.', 'warn');
  }

  /* ─── LOAD FILES ─── */
  async function loadFromDir(dir, silent = false) {
    showProgress(5);
    files.forEach(f => URL.revokeObjectURL(f.url));
    files = [];
    selected.clear();

    const entries = [];
    for await (const [name, handle] of dir.entries()) {
      if (handle.kind === 'file') entries.push({ name, handle });
    }

    let done = 0;
    const total = entries.length;

    for (const { name, handle } of entries) {
      const file = await handle.getFile();
      const type = file.type || guessType(name);
      if (SUPPORTED_TYPES.has(type)) {
        files.push({
          name,
          file,
          url: URL.createObjectURL(file),
          type,
          size: file.size,
          modified: file.lastModified
        });
      }
      done++;
      showProgress(5 + Math.round((done / total) * 90));
    }

    showProgress(100);
    setTimeout(() => hideProgress(), 500);

    updateStats();
    renderGrid();
    updateSelBar();

    document.getElementById('toolbar').style.display = files.length ? 'flex' : 'none';
    document.getElementById('btnClearAll').style.display = files.length ? 'inline-flex' : 'none';
    document.getElementById('btnRefresh').style.display = files.length ? 'inline-flex' : 'none';
    document.getElementById('statChips').style.display = files.length ? 'flex' : 'none';

    if (files.length) {
      if (!silent) toast(`Loaded ${files.length} status file${files.length !== 1 ? 's' : ''}`, 'ok');
    } else {
      toast('No supported media files found in this folder.', 'warn');
    }
  }

  function guessType(name) {
    const ext = name.split('.').pop().toLowerCase();
    const map = {
      jpg:'image/jpeg', jpeg:'image/jpeg', png:'image/png', webp:'image/webp', gif:'image/gif',
      mp4:'video/mp4', webm:'video/webm', mov:'video/quicktime', '3gp':'video/3gpp', mkv:'video/x-matroska'
    };
    return map[ext] || '';
  }

  /* ─── STATS ─── */
  function updateStats() {
    const imgs = files.filter(f => f.type.startsWith('image/')).length;
    const vids = files.filter(f => f.type.startsWith('video/')).length;
    document.getElementById('imgCnt').textContent = imgs;
    document.getElementById('vidCnt').textContent = vids;
  }

  /* ─── FILTER + SORT ─── */
  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    clearSel();
    renderGrid();
  }

  function getVisible() {
    let list = files.filter(f => {
      if (filter === 'image') return f.type.startsWith('image/');
      if (filter === 'video') return f.type.startsWith('video/');
      return true;
    });
    const sort = document.getElementById('sortSel')?.value || 'newest';
    if (sort === 'newest') list.sort((a,b) => b.modified - a.modified);
    else if (sort === 'oldest') list.sort((a,b) => a.modified - b.modified);
    else if (sort === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
    else if (sort === 'size') list.sort((a,b) => b.size - a.size);
    return list;
  }

  /* ─── RENDER ─── */
  function renderGrid() {
    const grid = document.getElementById('grid');
    const visible = getVisible();

    if (!files.length) {
      grid.innerHTML = `<div class="hero" style="grid-column:1/-1" id="heroState">
        <div class="hero-ring">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h1>View &amp; Save WhatsApp Statuses</h1>
        <p>Open your WhatsApp status cache folder. All images and videos you've already viewed will appear here.</p>
        <div class="hero-steps">
          <div class="step"><span class="step-num">1</span>View statuses in WhatsApp on your phone</div>
          <div class="step"><span class="step-num">2</span>Connect phone via USB or use file manager</div>
          <div class="step"><span class="step-num">3</span>Click "Open Status Folder" and pick it</div>
          <div class="step"><span class="step-num">4</span>Download any file to your gallery</div>
        </div>
        <div class="path-hint">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Android: &nbsp;<span>Internal Storage / WhatsApp / Media / .Statuses</span>
        </div>
        <button class="btn btn-primary" onclick="openFolder()" style="font-size:14px;padding:10px 22px">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Choose Folder
        </button>
      </div>`;
      return;
    }

    if (!visible.length) {
      grid.innerHTML = `<div class="hero" style="grid-column:1/-1">
        <div class="hero-ring"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
        <h1 style="font-size:20px">No ${filter} files found</h1>
        <p>Try switching the filter above.</p>
      </div>`;
      return;
    }

    grid.innerHTML = visible.map((f, i) => {
      const isImg = f.type.startsWith('image/');
      const isSel = selected.has(f.name);
      const delay = Math.min(i * 25, 300);
      return `
        <div class="card${isSel ? ' selected' : ''}" data-name="${escHtml(f.name)}"
             style="animation-delay:${delay}ms"
             onclick="toggleSel('${escJs(f.name)}')">
          ${isImg
            ? `<img class="card-thumb" src="${f.url}" alt="${escHtml(f.name)}" loading="lazy">`
            : `<video class="card-thumb" src="${f.url}" muted preload="metadata"></video>`
          }
          ${!isImg ? `<div class="play-icon"><div class="play-circle"><svg viewBox="0 0 10 12"><polygon points="1,1 9,6 1,11" fill="white"/></svg></div></div>` : ''}
          <span class="type-badge ${isImg ? 'badge-img' : 'badge-vid'}">${isImg ? 'IMG' : 'VID'}</span>
          <div class="check">
            <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="card-overlay">
            <div class="card-bottom">
              <span class="card-fname">${escHtml(f.name)}</span>
              <div class="card-btns">
                <div class="cibtn" title="Preview" onclick="event.stopPropagation();openLb('${escJs(f.name)}')">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
                <div class="cibtn" title="Download" onclick="event.stopPropagation();dlFile('${escJs(f.name)}')">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  /* ─── SELECTION ─── */
  function toggleSel(name) {
    if (selected.has(name)) selected.delete(name);
    else selected.add(name);
    const card = document.querySelector(`.card[data-name="${CSS.escape(name)}"]`);
    if (card) card.classList.toggle('selected', selected.has(name));
    updateSelBar();
  }

  function selectAll() {
    getVisible().forEach(f => selected.add(f.name));
    document.querySelectorAll('.card').forEach(c => c.classList.add('selected'));
    updateSelBar();
  }

  function clearSel() {
    selected.clear();
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    updateSelBar();
  }

  function updateSelBar() {
    const bar = document.getElementById('selBar');
    document.getElementById('selNum').textContent = selected.size;
    bar.classList.toggle('show', selected.size > 0);
  }

  /* ─── DOWNLOAD ─── */
  function dlFile(name) {
    const f = files.find(x => x.name === name);
    if (!f) return;
    const a = document.createElement('a');
    a.href = f.url;
    a.download = f.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    toast(`Saved: ${f.name}`, 'ok');
  }

  async function downloadSelected() {
    const toGet = files.filter(f => selected.has(f.name));
    if (!toGet.length) return;
    for (const f of toGet) {
      await new Promise(r => setTimeout(r, 150));
      const a = document.createElement('a');
      a.href = f.url;
      a.download = f.name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
    toast(`Downloading ${toGet.length} file${toGet.length !== 1 ? 's' : ''}`, 'ok');
    clearSel();
  }

  /* ─── CLEAR ALL ─── */
  function clearAll() {
    files.forEach(f => URL.revokeObjectURL(f.url));
    files = [];
    selected.clear();
    filter = 'all';
    document.querySelectorAll('.ftab').forEach((t,i) => t.classList.toggle('active', i===0));
    document.getElementById('toolbar').style.display = 'none';
    document.getElementById('btnClearAll').style.display = 'none';
    document.getElementById('btnRefresh').style.display = 'none';
    document.getElementById('statChips').style.display = 'none';
    updateSelBar();
    renderGrid();
  }

  /* ─── LIGHTBOX ─── */
  function openLb(name) {
    const f = files.find(x => x.name === name);
    if (!f) return;
    const isImg = f.type.startsWith('image/');
    document.getElementById('lbMedia').innerHTML = isImg
      ? `<img src="${f.url}" alt="${escHtml(f.name)}">`
      : `<video src="${f.url}" controls autoplay style="max-width:92vw;max-height:80vh;border-radius:12px;"></video>`;
    document.getElementById('lbName').textContent = f.name;
    document.getElementById('lbDl').onclick = () => dlFile(name);
    document.getElementById('lb').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLb(e) {
    if (e && e.target !== document.getElementById('lb') && !e.target.closest('.lb-close')) return;
    document.getElementById('lb').classList.remove('open');
    document.getElementById('lbMedia').innerHTML = '';
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLb({ target: document.getElementById('lb') });
  });

  /* ─── PROGRESS ─── */
  function showProgress(pct) {
    document.getElementById('pbar').classList.add('show');
    document.getElementById('pbarFill').style.width = pct + '%';
  }
  function hideProgress() {
    document.getElementById('pbar').classList.remove('show');
    document.getElementById('pbarFill').style.width = '0%';
  }

  /* ─── TOAST ─── */
  function toast(msg, type='ok') {
    const t = document.getElementById('toast');
    const ico = document.getElementById('toastIco');
    document.getElementById('toastMsg').textContent = msg;
    ico.className = 'toast-ico' + (type === 'err' ? ' err' : type === 'warn' ? ' warn' : '');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
  }

  /* ─── UTILS ─── */
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escJs(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
</script>
</body>
</html>
